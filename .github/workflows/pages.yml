name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js .nojekyll README.md _site/
          # Optional JS modules (present in repo)
          for f in visuals.js hobby-advanced.js pro-suite.js mlb-github.js; do
            [ -f "$f" ] && cp "$f" _site/
          done
          cp -R icons _site/icons
          [ -d assets ] && cp -R assets _site/assets
          [ -d data ] && cp -R data _site/data
          [ -d vault ] && cp -R vault _site/vault
          # Drop non-site noise from vault publish
          rm -f _site/vault/parse-fails.txt _site/vault/commons-card-scans.json
          # iCloud stubs are useless on Pages
          find _site -name '*.icloud' -delete || true
          ls -lah _site/vault | head -30
          ls -lah _site | head -20
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
