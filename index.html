<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#002d62">
<title>Card Vault · Astros</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Card Vault Astros">
<meta name="application-name" content="Card Vault">
<meta name="description" content="Sports card collection tracker — values, P/L, Excel export. Data stays on your device.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<style>

/* Card Ladder–style UI: SF Pro / system font, light surfaces, flat iOS chrome */
:root{
  /* Houston Astros — navy + orange */
  --astros-navy:#002d62;
  --astros-orange:#eb6e1f;
  --astros-star:#f4911e;
  --bg:#eef1f6;
  --bg2:#ffffff;
  --panel:#ffffff;
  --panel2:#f3f5f9;
  --panel3:#e4e8ef;
  --ink:#0a1628;
  --dim:#3a4558;
  --mute:#7a8496;
  --acc:var(--astros-orange);
  --acc2:#ff8a3d;
  --green:#30d158;
  --red:#ff3b30;
  --amber:#ff9f0a;
  --violet:#bf5af2;
  --line:rgba(0,45,98,.10);
  --sep:rgba(0,45,98,.14);
  --xl:#30d158;
  --radius:12px;
  --radius-lg:16px;
  --shadow:0 1px 2px rgba(0,45,98,.05), 0 6px 16px rgba(0,45,98,.08);
  --shadow-soft:0 1px 2px rgba(0,45,98,.04);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;min-height:100%;background:var(--bg);color:var(--ink);
  font-family:var(--font);font-size:17px;line-height:1.35;
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
  background-image:
    radial-gradient(900px 420px at 0% -10%, rgba(235,110,31,.14), transparent 55%),
    radial-gradient(800px 400px at 100% 0%, rgba(0,45,98,.10), transparent 50%),
    linear-gradient(180deg, #f4f6fb 0%, var(--bg) 240px);
  background-attachment:fixed;
}
button{
  font:inherit;border:0;background:var(--panel2);color:var(--ink);
  border-radius:10px;padding:11px 14px;cursor:pointer;font-weight:600;
}
button:active{opacity:.65}
button:disabled{opacity:.35}
input,select,textarea{
  font:inherit;font-size:17px;background:var(--panel2);color:var(--ink);
  border:0;border-radius:10px;padding:11px 14px;width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 3px rgba(0,122,255,.25)}
header{
  position:sticky;top:0;z-index:20;background:rgba(242,242,247,.86);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid var(--sep);
  padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top));
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
}
h1{font-size:17px;font-weight:600;margin:0;letter-spacing:-.2px}
h1::before{display:none!important;content:none!important}
#tabsTop{display:flex;gap:0;background:var(--panel3);border-radius:9px;padding:2px}
.tab{padding:7px 11px;border-radius:7px;color:var(--dim);cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600}
.tab.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
#q{flex:1;min-width:110px;max-width:280px;background:#e3e3e8}
.bigim{background:var(--acc);color:#fff;font-weight:600;border-radius:10px;padding:12px 16px;box-shadow:none}
.bigxl{background:var(--green);color:#fff;font-weight:600;border-radius:10px;padding:12px 16px;box-shadow:none}
main{padding:12px 16px;max-width:720px;margin:0 auto;padding-bottom:calc(90px + env(safe-area-inset-bottom))}
@media(min-width:900px){main{max-width:980px;padding-bottom:28px}}

.panel{
  background:var(--panel);border:0;border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow-soft);
}
.heroPanel{
  background:linear-gradient(180deg, #ffffff 0%, #fbfbfd 100%);
  border:0;overflow:visible;box-shadow:var(--shadow);
}
.heroPanel::after{display:none!important}
.heroTitle{
  font-size:34px;font-weight:700;letter-spacing:-.8px;margin:0 0 4px;color:var(--ink);
  background:none;-webkit-background-clip:unset;background-clip:unset;
  font-variant-numeric:tabular-nums;
}
.heroPanel .heroTitle{
  font-size:40px;font-weight:700;letter-spacing:-1px;color:var(--ink);
  background:none;-webkit-background-clip:unset;background-clip:unset;font-family:var(--font);
}
.heroSub{color:var(--mute);font-size:15px;margin:0 0 14px;line-height:1.4;font-weight:400}
.ct{font-size:13px;color:var(--mute);margin:0 0 8px;font-weight:400;text-transform:none;letter-spacing:0}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.count{color:var(--mute);font-size:13px;margin-left:auto;font-weight:400;font-family:var(--font)}
.viewtog{display:flex;background:var(--panel3);border-radius:9px;padding:2px;border:0}
.viewtog button{border:0;background:transparent;border-radius:7px;padding:6px 12px;font-weight:600;font-size:13px}
.viewtog button.on{background:var(--panel);box-shadow:var(--shadow)}

.row{
  display:flex;gap:12px;align-items:center;padding:12px 4px;
  border-bottom:0.5px solid var(--sep);cursor:pointer;border-radius:0;margin:0;
}
.row:active{background:rgba(0,0,0,.04)}
.thumb{
  width:44px;height:62px;border-radius:8px;flex:none;overflow:hidden;position:relative;
  background:linear-gradient(180deg,#f4f5f8,#e8ebf0);box-shadow:var(--shadow-soft);border:0.5px solid var(--sep);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mute);
}
.thumb img{width:100%;height:100%;object-fit:contain;background:#fff}
.rmain{flex:1;min-width:0}
.rmain .l1{font-weight:600;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.rmain .l2{font-size:13px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.rright{text-align:right;flex:none;min-width:78px}
.rright .v{font-weight:600;font-size:17px;font-family:var(--font);letter-spacing:-.2px;font-variant-numeric:tabular-nums}
.rright .g{font-size:13px;font-weight:600;font-family:var(--font)}
.spark{display:none}
@media(min-width:700px){.spark{display:block;width:70px;height:26px;flex:none}}

.badge{font-size:11px;font-weight:600;border-radius:4px;padding:1px 5px;margin-left:6px;border:0}
.b-rc{background:#fff3cd;color:#9a6700}
.b-ser{background:#e8f1ff;color:#007aff}
.b-deal{background:#e4f8ea;color:#248a3d}
.b-want{background:#fff3cd;color:#9a6700}
.b-sold{background:#f3e8ff;color:#8944ab}
.b-own{background:#e4f8ea;color:#248a3d}
.b-stale{background:var(--panel2);color:var(--mute)}

.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(min-width:700px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}}
.gcard{
  background:var(--panel);border:0.5px solid var(--sep);border-radius:14px;overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .18s var(--ease), box-shadow .18s var(--ease), opacity .18s;
}
.gcard:active{opacity:.92;transform:scale(.985)}
.gcard .gimg{
  aspect-ratio:2.5/3.5;min-height:0;position:relative;
  background:linear-gradient(180deg,#f7f8fb 0%,#eef1f6 100%);
  display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--mute);
}
.gcard .gimg::after{display:none!important}
.gcard .gimg img{width:100%;height:100%;object-fit:contain;background:#fff}
.gcard .gt{padding:10px}
.gcard .gt .l1{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.gcard .gt .l2{font-size:12px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.gcard .gt .l3{font-weight:600;margin-top:6px;font-size:16px;font-family:var(--font);letter-spacing:-.2px;color:var(--ink);font-variant-numeric:tabular-nums}
.gcard .gt .cardActs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.gcard .gt .cardActs button{
  min-height:36px;border-radius:8px;font-size:13px;font-weight:600;background:var(--panel2);border:0;color:var(--acc);
}
.gcard .gt .cardActs button[data-add^="have"]{background:var(--acc);color:#fff}

.empty{color:var(--mute);text-align:center;padding:48px 16px;font-size:15px}
.empty.soft{padding:24px 12px}
.bigActs{display:flex;flex-direction:column;gap:8px;margin-top:16px;max-width:300px;margin-left:auto;margin-right:auto}
.bigActs button{min-height:48px;background:var(--acc);color:#fff}

#navB{
  position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;
  background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(22px);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  border-top:0.5px solid var(--sep);padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -8px 24px rgba(16,24,40,.04);
}
#navB .nb{flex:1;text-align:center;padding:6px 0 4px;color:var(--mute);font-size:10px;font-weight:500;cursor:pointer}
#navB .nb .i{font-size:22px;display:block;margin-bottom:1px;filter:none;text-shadow:none;line-height:1.1}
#navB .nb.on{color:var(--acc)}
#navB .nb.on .i{filter:none;text-shadow:none;color:var(--acc)}
@media(min-width:900px){#navB{display:none}}
@media(max-width:899px){#tabsTop{display:none}}

#fab{
  position:fixed;right:16px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:21;
  width:56px;height:56px;border-radius:28px;border:0;font-size:32px;line-height:0;font-weight:300;color:#fff;
  background:linear-gradient(180deg,#3b95ff 0%, var(--acc) 100%);
  box-shadow:0 6px 18px rgba(0,122,255,.38);
}
@media(min-width:900px){#fab{display:none}}
#fabMenu{
  position:fixed;right:16px;bottom:calc(136px + env(safe-area-inset-bottom));z-index:22;
  background:var(--panel);border:0.5px solid var(--sep);border-radius:14px;padding:6px;min-width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.18);
}
#fabMenu button{display:block;width:100%;text-align:left;background:transparent;border:0;padding:14px;border-radius:10px;font-weight:400;font-size:17px;min-height:48px;color:var(--acc)}

#sheetBk{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30;display:none;backdrop-filter:none}
#sheet{position:fixed;z-index:31;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 0 calc(28px + env(safe-area-inset-bottom));border:0}
@media(max-width:899px){
  #sheet{top:auto;left:0;right:0;bottom:0;width:100%;max-height:min(94dvh,94vh);border-radius:14px 14px 0 0;
    transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);padding-top:0}
  #sheet.open{transform:none}
  #sheet::before{content:'';display:block;width:36px;height:5px;border-radius:3px;background:rgba(60,60,67,.18);margin:8px auto 0}
}
@media(min-width:900px){
  #sheet{top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--panel);border-left:0.5px solid var(--sep);
    transform:translateX(105%);transition:transform .25s;padding:16px;padding-top:calc(16px + env(safe-area-inset-top))}
  #sheet.open{transform:none}
  #sheet::before{display:none}
}
.shead{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.shead h2{margin:0;font-size:20px;font-weight:700;flex:1;letter-spacing:-.3px}

.pill-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 10px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{
  min-height:32px;padding:7px 12px;border-radius:999px;font-weight:600;font-size:13px;
  background:var(--panel);border:0.5px solid var(--sep);white-space:nowrap;flex:none;color:var(--ink);
  box-shadow:var(--shadow-soft);
}
.pill.on,.pill.showPill{background:var(--acc);border-color:var(--acc);color:#fff}

.actionBar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.actionBar button{min-height:44px;font-size:15px;font-weight:600;border-radius:10px;background:var(--panel);color:var(--acc);border:0.5px solid var(--sep)}
.progBar{height:3px;background:var(--panel3);border-radius:99px;overflow:hidden;margin:8px 0}
.progBar>i{display:block;height:100%;width:0;background:var(--acc);border-radius:99px;transition:width .2s}

.quickGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quickCard{
  min-height:72px;border-radius:14px;text-align:left;padding:14px;
  background:var(--panel2);border:0.5px solid var(--sep);box-shadow:none;
  transition:transform .15s var(--ease), background .15s;
}
.quickCard:active{transform:scale(.98);background:#e9ebf0}
.quickCard b{display:block;font-size:15px;font-weight:600;margin-bottom:3px;color:var(--ink)}
.quickCard span{font-size:13px;color:var(--mute);font-weight:400;line-height:1.3}
.home-actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 0}
.home-actions button{flex:1;min-width:100px;min-height:44px;font-weight:600;border-radius:10px;font-size:13px;background:var(--panel2);color:var(--acc);border:0}

.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:700px){.chips{grid-template-columns:repeat(4,1fr)}}
.chipStat{background:var(--panel2);border:0.5px solid transparent;border-radius:14px;padding:12px}
.chipStat .k{font-size:12px;color:var(--mute);font-weight:400;text-transform:none;letter-spacing:0}
.chipStat .v{font-size:22px;font-weight:700;margin-top:2px;letter-spacing:-.4px;font-family:var(--font);font-variant-numeric:tabular-nums}
.chipStat .s{font-size:12px;color:var(--mute);margin-top:2px}

.chartsGrid{display:none}
@media(min-width:900px){.chartsGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}}
canvas.chart{width:100%;background:var(--panel2);border:0;border-radius:12px;display:block}

.findSearch{display:flex;gap:8px;align-items:stretch}
.findSearch input{flex:1;background:var(--panel3);border:0}
.findSearch button{flex:none;min-width:90px}
.mutedLink{background:transparent;border:0;color:var(--acc);font-weight:400;padding:12px 0;font-size:17px}

#toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));
  background:rgba(30,30,30,.92);color:#fff;border:0;border-radius:14px;padding:12px 16px;z-index:90;
  display:none;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:90vw;font-size:15px;font-weight:500;
}
.pos{color:var(--green)}.neg{color:var(--red)}.amber{color:var(--amber)}

.f{margin-bottom:10px} .f label{display:block;font-size:13px;color:var(--mute);margin-bottom:4px;font-weight:400;text-transform:none;letter-spacing:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.photoBox{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.photoBox .pv{
  width:110px;height:154px;border-radius:8px;overflow:hidden;flex:none;background:#eee;border:0.5px solid var(--sep);
  display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--mute);box-shadow:none;
}
.photoBox .pv img{width:100%;height:100%;object-fit:contain;background:#fff}
.photoBox .pbtns{display:flex;flex-direction:column;gap:6px;flex:1}
.photoBox .pbtns button{min-height:40px;text-align:left;font-size:15px;background:var(--panel);color:var(--acc);font-weight:400}
.autoc{position:absolute;left:0;right:0;top:100%;z-index:40;background:var(--panel);border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.18);max-height:240px;overflow:auto;margin-top:6px;border:0.5px solid var(--sep)}
.autoc>div{display:flex;gap:10px;align-items:center;padding:12px;border-bottom:0.5px solid var(--sep);cursor:pointer}
.autoc>div:active{background:var(--panel2)}
.autoc .m{font-size:13px;color:var(--mute)}
#menuBk{
  position:fixed;inset:0;z-index:49;background:rgba(10,18,32,.48);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;
}
#menu{
  position:fixed;z-index:50;left:0;right:0;bottom:0;top:auto;width:100%;
  max-height:min(88dvh,88vh);overflow:auto;-webkit-overflow-scrolling:touch;
  background:var(--panel);border-radius:18px 18px 0 0;padding:0 0 calc(14px + env(safe-area-inset-bottom));
  box-shadow:0 -12px 40px rgba(0,45,98,.28);display:none;border:0;min-width:0;
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
}
#menu.open{transform:none}
#menu .menuGrab{
  width:40px;height:5px;border-radius:99px;background:rgba(60,60,67,.22);
  margin:10px auto 6px;
}
#menu .menuTitle{
  font-size:20px;font-weight:800;letter-spacing:-.3px;padding:4px 18px 12px;color:var(--astros-navy,#002d62);
}
#menu .menuSec{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mute);padding:10px 18px 6px;
}
#menu .menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px}
#menu button.menuItem{
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:4px;
  width:100%;text-align:left;background:var(--panel2,#f2f4f8);border:0.5px solid var(--sep);
  padding:14px 12px;border-radius:14px;font-weight:700;font-size:14px;color:var(--ink);
  min-height:72px;line-height:1.2;
}
#menu button.menuItem .miI{font-size:20px;line-height:1}
#menu button.menuItem .miS{font-size:11px;font-weight:500;color:var(--mute);display:block;margin-top:2px}
#menu button.menuItem.primary{
  background:linear-gradient(145deg,var(--astros-orange,#eb6e1f),#d4550a);color:#fff;border-color:transparent;
  grid-column:1 / -1;min-height:56px;flex-direction:row;align-items:center;gap:10px;
}
#menu button.menuItem.primary .miS{color:rgba(255,255,255,.88)}
#menu button.menuItem.danger{color:var(--red,#c0392b)}
@media(min-width:900px){
  #menu{
    left:auto;right:16px;bottom:auto;top:64px;width:min(380px,92vw);
    border-radius:16px;transform:none;max-height:80vh;
    box-shadow:0 16px 40px rgba(0,45,98,.22);
  }
  #menu .menuGrab{display:none}
}
.menuBtn{
  min-height:34px!important;min-width:auto!important;padding:6px 12px!important;
  border-radius:999px!important;font-size:14px!important;font-weight:700!important;
  background:rgba(255,255,255,.16)!important;color:#fff!important;
  border:0.5px solid rgba(255,255,255,.28)!important;letter-spacing:.02em;
}
.menuBtn:active{opacity:.75}
.backupBanner{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:linear-gradient(135deg,rgba(235,110,31,.14),rgba(0,45,98,.08));
  border:0.5px solid rgba(235,110,31,.32);border-radius:14px;padding:12px 14px;margin-bottom:10px;
}
.backupBanner .bbTxt{flex:1;min-width:160px;font-size:14px;color:var(--astros-navy,#002d62);font-weight:600;line-height:1.35}
.backupBanner button{
  min-height:40px;border-radius:10px;font-weight:700;padding:0 14px;
  background:var(--astros-orange,#eb6e1f);color:#fff;border:0;
}
.rareVault{
  position:relative;border-radius:18px;padding:14px 12px 16px;margin:8px 0 12px;overflow:hidden;
  background:
    radial-gradient(500px 180px at 80% -20%, rgba(235,110,31,.28), transparent 60%),
    linear-gradient(160deg, #071428 0%, #0c2a56 45%, #123a6b 100%);
  color:#fff;box-shadow:0 12px 32px rgba(0,45,98,.35);
  border:0.5px solid rgba(255,255,255,.12);
}
.rareVault .rvHead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:0 4px 10px}
.rareVault .rvTitle{
  font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--astros-orange,#eb6e1f);
}
.rareVault .rvSub{font-size:12px;color:rgba(255,255,255,.55);font-weight:500}
.rareRail{

/* ===== Cooler collector layer ===== */
:root{
  --foil: linear-gradient(115deg, transparent 20%, rgba(255,255,255,.55) 40%, transparent 60%);
}
body.cv-cool{
  background-color:#e9eef5;
  background-image:
    radial-gradient(900px 420px at 8% -8%, rgba(235,110,31,.16), transparent 55%),
    radial-gradient(760px 400px at 100% 0%, rgba(0,45,98,.12), transparent 52%),
    linear-gradient(180deg, #f5f7fb 0%, #e9eef5 280px);
}
.heroPanel.coolHero{
  position:relative;overflow:hidden;
  background:
    linear-gradient(135deg, rgba(0,122,255,.08) 0%, transparent 42%),
    linear-gradient(180deg, #fff 0%, #f7f8fc 100%);
  border:0.5px solid rgba(0,122,255,.12);
}
.heroPanel.coolHero::before{
  content:'';position:absolute;right:-40px;top:-50px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle, rgba(0,122,255,.16), transparent 68%);
  pointer-events:none;
}
.heroEyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--acc);margin:0 0 8px;padding:4px 8px;border-radius:999px;
  background:rgba(0,122,255,.10);
}
.heroEyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(48,209,88,.25)}

.showcase{
  display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:4px 2px 12px;margin:4px 0 2px;scrollbar-width:none;
  scroll-snap-type:x mandatory;
}
.showcase::-webkit-scrollbar{display:none}
.showCard{
  flex:none;width:118px;scroll-snap-align:start;
  background:var(--panel);border-radius:14px;overflow:hidden;cursor:pointer;
  border:0.5px solid var(--sep);box-shadow:var(--shadow);
  position:relative;text-align:left;padding:0;
  transition:transform .18s var(--ease);
}
.showCard:active{transform:scale(.97)}
.showCard .sg{
  height:148px;background:linear-gradient(180deg,#1a2230,#2a3344);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.showCard .sg img{width:100%;height:100%;object-fit:contain;background:#111820}
.showCard .sg img.portraitFallback{object-fit:cover}
.showCard .sg .shine{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.22) 48%, transparent 62%);
  transform:translateX(-120%);
  animation:foilSweep 3.2s ease-in-out infinite;
}
.showCard .sm{padding:8px 9px 10px}
.showCard .sm .l1{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.showCard .sm .l2{font-size:11px;color:var(--mute);margin-top:2px}
.showCard .sm .l3{font-size:13px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}

@keyframes foilSweep{
  0%,55%{transform:translateX(-120%)}
  75%{transform:translateX(120%)}
  100%{transform:translateX(120%)}
}

.gcard{position:relative}
.gcard .foil{
  position:absolute;inset:0;pointer-events:none;opacity:0;z-index:3;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,.45) 42%, transparent 58%);

  box-shadow:0 0 0 1px rgba(235,110,31,.3);
}
.widgetHome .whRare img{width:100%;height:100%;object-fit:contain;min-height:118px}
.widgetHome .whRare .whTag{
  position:absolute;left:0;right:0;bottom:0;padding:5px;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
  font-size:10px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.widgetHome button.whTap{all:unset;cursor:pointer;display:flex;gap:12px;width:100%;align-items:stretch}

.confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.confetti i{
  position:absolute;top:-12px;width:8px;height:12px;border-radius:2px;
  animation:confettiFall 1s ease-in forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(540deg);opacity:0}
}

@media(max-width:899px){
  .widgetHome{margin:0 0 8px;padding:10px;border-radius:16px}
  .widgetHome .whVal{font-size:30px}
  .widgetHome .whRare{width:84px}

  .binderPocket{border-radius:8px}

}

/* ---------------- pure helpers (node-testable) ---------------- */
function normH(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
/* ---- CardSight AI response parsing (defensive — schema may evolve) ---- */
function csDeepArrays(o,out=[],d=0){
  if(d>4||!o)return out;
  if(Array.isArray(o)){if(o.length&&typeof o[0]==='object')out.push(o);return out;}
  if(typeof o==='object')for(const k in o)csDeepArrays(o[k],out,d+1);
  return out;
}
function csPickStr(o,res){
  for(const re of res){for(const k in o){
    if(re.test(k)&&typeof o[k]==='string'&&o[k].trim())return o[k].trim();
    if(re.test(k)&&typeof o[k]==='number')return String(o[k]);}}
  return '';
}
function csCardFrom(o){
  const flat={};
  (function fl(x,p,d){if(d>3||!x||typeof x!=='object'||Array.isArray(x))return;
    for(const k in x){const v=x[k];
      if(v&&typeof v==='object'&&!Array.isArray(v))fl(v,k+'_',d+1);
      else flat[(p||'')+k]=v;}})(o,'',0);
  return {
    player:csPickStr(flat,[/player/i,/athlete/i,/subject/i,/^name$/i,/card_?name/i,/title/i]),
    year:csPickStr(flat,[/year/i,/season/i]).slice(0,4),
    brand:csPickStr(flat,[/manufacturer/i,/brand/i]),
    setName:csPickStr(flat,[/set_?name/i,/^set$/i,/release/i,/product/i]),
    num:csPickStr(flat,[/card_?number/i,/^number$/i,/^num$/i,/^no$/i]),
    variant:csPickStr(flat,[/parallel/i,/variant/i,/insert/i]),
    team:csPickStr(flat,[/team/i]),
    sport:csPickStr(flat,[/sport/i,/category/i]),
    _raw:flat
  };
}
function csPrice(json){
  const hits=[];
  (function walk(o,path,d){if(d>5||!o)return;
    if(Array.isArray(o)){o.slice(0,50).forEach(x=>walk(x,path,d+1));return;}
    if(typeof o==='object'){for(const k in o)walk(o[k],k,d+1);return;}
    if(typeof o==='number'&&o>0.005&&o<2e6&&/price|value|sale|avg|average|median|market|mean|low|high|amount/i.test(path))
      hits.push({k:path.toLowerCase(),v:o});})(json,'',0);
  for(const pref of [/avg|average|mean/,/median|market/,/last|latest|recent|sale/,/price|value|amount/]){
    const f=hits.filter(h=>pref.test(h.k));
    if(f.length){f.sort((a,b)=>a.v-b.v);return f[Math.floor(f.length/2)].v;}
  }
  return null;
}
/* exact parsers for the CardSight OpenAPI schema (verified 2026-07) */
function csFromIdentify(j){
  const out=[];
  for(const d of (j&&j.detections)||[]){
    const c=d.card||{};
    const setPart=c.setName&&!/^base\b/i.test(c.setName)?c.setName:'';
    const o={confidence:d.confidence||'',cardId:c.id||'',
      player:c.name||'',year:c.year||'',brand:c.manufacturer||'',
      setName:[c.releaseName,setPart].filter(Boolean).join(' ').trim()||c.setName||'',
      num:c.number||'',variant:(c.parallel&&c.parallel.name)||'',
      serial:c.numberedTo?('/'+c.numberedTo):'',
      rookie:(c.attributes||[]).some(a=>/rookie|^rc$/i.test(a)),
      grade:(d.grading&&d.grading.company)?[d.grading.company.name,(d.grading.grade&&d.grading.grade.value)||''].join(' ').trim():''};
    if(o.player||o.setName)out.push(o);
  }
  return out;
}
function csNormCatalogHit(r){
  const x=(r&&(r.card||r))||{};
  const id=x.id||r.id||r.cardId||'';
  const setPart=x.setName&&!/^base\b/i.test(String(x.setName))?x.setName:'';
  return {
    cardId:id, id:id,
    player:x.name||x.player||r.name||'',
    year:x.year||x.releaseYear||r.year||'',
    brand:x.manufacturerName||x.manufacturer||r.manufacturerName||'',
    setName:[x.releaseName||r.releaseName,setPart].filter(Boolean).join(' ').trim()||(x.setName||''),
    num:x.number||x.num||'',
    variant:x.parallelName||(x.parallel&&x.parallel.name)||r.parallelName||'',
    serial:x.numberedTo?('/'+x.numberedTo):(r.numberedTo?('/'+r.numberedTo):''),
    rookie:(x.attributes||[]).some(a=>/rookie|^rc$/i.test(String(a))),
    grade:'', _cat:true, raw:x
  };
}
function csFromSearch(j){
  const raw=((j&&(j.cards||j.results||j.items))||[]);
  const cards=raw.map(csNormCatalogHit).filter(x=>x.cardId||x.player);
  if(cards.length) return cards;
  /* legacy: typed results */
  return ((j&&j.results)||[]).filter(r=>!r.type||r.type==='card').map(csNormCatalogHit).filter(x=>x.cardId||x.player);
}
function csPriceFromPricing(data){
  let recs=(data&&data.raw&&data.raw.records)||[];
  if(!recs.length&&data&&Array.isArray(data.graded))
    for(const co of data.graded)for(const g of (co.grades||[]))recs=recs.concat(g.records||[]);
  recs=recs.filter(r=>typeof r.price==='number'&&r.price>0);
  if(!recs.length)return null;
  const au=recs.filter(r=>r.listing_type==='auction');
  const p=(au.length?au:recs).map(r=>r.price).sort((a,b)=>a-b);
  return p[Math.floor(p.length/2)];
}
function csPriceSmart(j,gradeStr){
  const recs=((j&&j.results)||[]).filter(r=>typeof r.price==='number'&&r.price>0);
  if(!recs.length)return null;
  const raw=!gradeStr||/^raw$/i.test(String(gradeStr).trim());
  const toks=String(gradeStr||'').toLowerCase().split(/\s+/);
  const gm=r=>{
    if(!r.grade)return raw;
    if(raw)return false;
    return toks.includes(String(r.grade.company_name||'').toLowerCase())&&
           toks.includes(String(r.grade.grade_value||'').toLowerCase());
  };
  const pools=[recs.filter(r=>gm(r)&&r.listing_type==='auction'),recs.filter(gm),
               recs.filter(r=>r.listing_type==='auction'),recs];
  for(const p of pools)if(p.length){
    const v=p.map(r=>r.price).sort((a,b)=>a-b);
    return v[Math.floor(v.length/2)];
  }
  return null;
}
/* ---- embedded MLB register (every player 1871-present, compressed) ---- */
function bbNorm(s){return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function bbParse(txt){return txt.split('\n').filter(Boolean).map(l=>{const a=l.split('|');
  return {n:a[0],s:bbNorm(a[0]),y0:+a[1]||0,y1:+a[2]||0};});}
function bbSearch(list,q,limit=6){
  q=bbNorm(q).trim();if(q.length<2||!list)return[];
  const out=[];
  for(const p of list){
    const n=p.s;
    let s=-1;
    if(n.startsWith(q))s=3;
    else{const i=n.indexOf(q);
      if(i>0&&n[i-1]===' ')s=2;else if(i>=0)s=1;}
    if(s>=0)out.push([s,p]);
  }
  out.sort((a,b)=>b[0]-a[0]||b[1].y1-a[1].y1);
  return out.slice(0,limit).map(x=>x[1]);
}

async function csBulkPriceByIds(ids,{force=false}={}){

      if(hit&&(Date.now()-hit.t)<CS_STALE_MAX){out[id]=hit.v;CS_STATS.hits++;CS_STATS.stale++;continue;}
    }
    need.push(id);
  }
  if(!need.length){CS_STATS.saved+=card_ids.length;return out;}
  need.sort();
  const j=await csFetch('/v1/pricing/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({card_ids:need,period:'1y',listing_type:'both',limit:25})

}

        encodeURIComponent(hit.mlbId)+'/headshot/67/current';
    }
  }

    const tag='Pos: '+hit.pos;
    if(!c.notes)c.notes=tag;

const sdbCache=new Map();let sdbTimer=null,sdbAbort=null;
async function sdbSearch(name){
  const k=name.toLowerCase();
  if(sdbCache.has(k))return sdbCache.get(k);
  try{
    if(sdbAbort)sdbAbort.abort();
    sdbAbort=new AbortController();
    const r=await fetch('https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p='+encodeURIComponent(name),
      {signal:sdbAbort.signal});
    const j=await r.json();
    const out=(j.player||[]).filter(p=>/baseball/i.test(String(p.strSport||''))).slice(0,8).map(p=>({name:p.strPlayer,team:p.strTeam||'',sport:'Baseball',
      pos:p.strPosition||'',img:p.strCutout||p.strThumb||''}));
    sdbCache.set(k,out);return out;
  }catch(e){return [];}
}

function filtered(){
  let cs=state.cards.filter(c=>tab==='dash'||c.status===tab);
  if(typeof applyBinder==='function' && (tab==='have'||tab==='want'||tab==='sold')){
    const bid=window.BINDER_ID||'all';
    if(bid==='want'&&tab==='have') cs=state.cards.filter(c=>c.status==='want');
    else if(bid!=='all'&&bid!=='want') cs=applyBinder(cs);
  }
  const sp=($('fSport')||{}).value||'';
  if(sp)cs=cs.filter(c=>c.sport===sp);
  if(q){const s=q.toLowerCase();
    cs=cs.filter(c=>FIELDS.some(k=>String(c[k]||'').toLowerCase().includes(s))||String(c.gradeCert||'').toLowerCase().includes(s));}
  const m=($('fSort')||{}).value||'recent';
  const g=c=>{const x=gainPct(c);return x==null?-1e9:x;};
  listGroup=($('fGroup')||{}).value||'';
  if(m==='player'||listGroup==='player')cs.sort((a,b)=>String(a.player||'').localeCompare(b.player||'')||(b.created||0)-(a.created||0));
  else if(m==='year'||listGroup==='year')cs.sort((a,b)=>(+b.year||0)-(+a.year||0)||String(a.player||'').localeCompare(b.player||''));
  else if(listGroup==='set')cs.sort((a,b)=>String(a.setName||'').localeCompare(b.setName||'')||(+a.num||0)-(+b.num||0));
  else if(listGroup==='team')cs.sort((a,b)=>String(a.team||'').localeCompare(b.team||'')||String(a.player||'').localeCompare(b.player||''));
  else if(listGroup==='parallel')cs.sort((a,b)=>String(a.variant||'').localeCompare(b.variant||'')||String(a.player||'').localeCompare(b.player||''));
  else if(listGroup==='grade')cs.sort((a,b)=>String(a.grade||'').localeCompare(b.grade||'')||String(a.player||'').localeCompare(b.player||''));
  else if(m==='rarity')cs.sort((a,b)=>rarityScore(b)-rarityScore(a)||valueOf(b)*(b.qty||1)-valueOf(a)*(a.qty||1));
  else if(m==='value')cs.sort((a,b)=>valueOf(b)*(b.qty||1)-valueOf(a)*(a.qty||1));
  else if(m==='gain')cs.sort((a,b)=>g(b)-g(a));
  else if(m==='d30')cs.sort((a,b)=>(deltaDays(b,30)??-1e9)-(deltaDays(a,30)??-1e9));
  else cs.sort((a,b)=>(b.created||0)-(a.created||0));
  return cs;
}

async function resolveCardImg(c){
  if(!c)return '';
  try{
    const own=await getImg(c);
    if(own)return own;
  }catch(e){}
  if(c.csId && typeof csImageData==='function' && typeof csKey==='function' && csKey()){
    try{
      const url=typeof csImgSrc==='function'?csImgSrc(await csImageData(c.csId)):'';
      if(url)return url;
    }catch(e){}
  }
  if(typeof mlbPortraitUrl==='function'){
    const mlb=mlbPortraitUrl(c,240);
    if(mlb){ if(!c._pPhoto)c._pPhoto=mlb; return mlb; }
  }
  if(c._pPhoto)return c._pPhoto;
  if(typeof wikiPortraitUrl==='function'&&c.player){
    try{
      const w=await wikiPortraitUrl(c.player);
      if(w){c._pPhoto=w;return w;}
    }catch(e){}
  }
  return '';
}
async function fillThumb(el,c){
  if(!el||!c)return;
  el.classList.add('thumbLoad');
  try{
    let src=await resolveCardImg(c);
    if(src&&src.startsWith('data:')&&typeof csDisplayUrl==='function'){
      /* resolveCardImg may return raw data — prefer blob on iOS */
      src=csDisplayUrl(src);
    }else if(src&&typeof csDisplayUrl==='function'&&!src.startsWith('http')&&!src.startsWith('blob:')){
      src=csDisplayUrl(src);
    }
    if(src){
      setImgEl(el,src);
      if(!c.imgId&&!c.imgUrl&&c.csId)el.classList.add('catalogHint');
      else el.classList.remove('catalogHint');
    }else if(typeof applyPortraitFallback==='function' && applyPortraitFallback(el,c)){
      el.classList.remove('imgMiss');
    }else el.classList.add('imgMiss');
  }finally{el.classList.remove('thumbLoad');}
}

      let taps=0, tmr=null;

        const c=state.cards.find(x=>x.id===btn.dataset.id); if(!c)return;

          if(taps>=2){sel=c;haptic('light');openSheet();}

      grid.ontouchend=e=>{
        if(x0==null)return;
        const dx=e.changedTouches[0].clientX-x0; x0=null;
        if(Math.abs(dx)<48)return;
        if(dx<0){binderPage++;haptic('light');renderList();}
        else if(binderPage>0){binderPage--;haptic('light');renderList();}
      };
    }
    (cs||[]).slice(binderPage*9,binderPage*9+9).forEach(paintPocket);
    /* celebrate full page */
    const pageCards=(cs||[]).slice(binderPage*9,binderPage*9+9);
    if(pageCards.length===9&&pageCards.every(Boolean)&&!state.meta['_bpCongrats_'+binderPage]){

function rarityScore(c){
  if(!c) return 0;
  let s = 0;
  const v = valueOf(c) * (+c.qty || 1);
  s += Math.min(40, Math.log10(Math.max(v, 1) + 1) * 18);
  const g = String(c.grade || '').toUpperCase();
  if (/PSA\s*10|SGC\s*10|BGS\s*10|GEM/.test(g)) s += 28;
  else if (/PSA\s*9|BGS\s*9\.5|SGC\s*9/.test(g)) s += 18;
  else if (/PSA\s*8|BGS\s*9|SGC\s*8/.test(g)) s += 10;
  const ser = String(c.serial || '');
  const m = ser.match(/(\d+)\s*\/\s*(\d+)/) || ser.match(/\/(\d+)/);
  if (m) {
    const den = +(m[2] || m[1] || 0);
    if (den > 0 && den <= 10) s += 26;
    else if (den <= 25) s += 20;
    else if (den <= 99) s += 14;
    else if (den <= 299) s += 8;
  }
  const varn = String(c.variant || c.setName || '');
  if (/SSP|SUPER\s*SHORT|1\/1|ONE\s*OF\s*ONE/i.test(varn)) s += 22;
  else if (/\bSP\b|SHORT\s*PRINT|REFRACTOR|GOLD|ORANGE/i.test(varn)) s += 10;
  if (c.rookie) s += 8;
  if (c.csId) s += 2;
  return s;
}
function rarityTag(c){
  const ser = String(c.serial || '');
  const m = ser.match(/\/(\d+)/);
  if (m && +m[1] <= 25) return '/' + m[1];
  const g = String(c.grade || '');
  if (g) return g;
  if (c.rookie) return 'RC';
  if (/SSP|1\/1/i.test(String(c.variant||''))) return 'SSP';
  return 'KEY';
}

/* ---- Baseball-first catalog propagate ---- */
const BB_SPORT='Baseball';
function isBaseballCard(x){
  if(!x||typeof x!=='object')return true;
  const blob=[x.sport,x.segment,x.segmentName,x.category,x.releaseName,x.setName,x.name]
    .map(v=>String(v||'')).join(' ').toLowerCase();
  if(/pok[eé]mon|yu-?gi|magic:? the gathering|\bmtg\b|one piece|lorcana|digimon/.test(blob))return false;
  if(/football|basketball|hockey|soccer|nba|nfl|nhl/.test(blob) && !/baseball|mlb|topps|bowman|panini prizm baseball|donruss baseball/.test(blob)){
    /* soft: keep if year+player search typically baseball manufacturers */
    if(/topps|bowman|upper deck|fleer|leaf|heritage|stadium club|chrome/.test(blob))return true;
    return false;
  }
  return true;
}
function filterBaseballCards(list){return (list||[]).filter(isBaseballCard);}
async function csSearchBaseballCards(q, {take=24, skip=0}={}){
  const name=String(q||'').trim();
  if(name.length<2)return {cards:[], total_count:0};
  let cards=[], total=0;
  try{
    const j=await csFetchCached('/v1/catalog/cards?take='+take+'&sort=year&order=desc&skip='+skip+'&name='+encodeURIComponent(name),{},{ttlMs:CS_TTL_CAT});
    cards=filterBaseballCards(j.cards||[]);
    total=j.total_count||cards.length;
  }catch(e){ /* try search */ }
  if(!cards.length){
    try{
      const j=await csFetchCached('/v1/catalog/search?type=card&take='+take+'&q='+encodeURIComponent(name+' baseball'),{},{ttlMs:CS_TTL_CAT});
      const raw=(j.cards||j.results||j.items||[]).map(x=>x.card||x);
      cards=filterBaseballCards(raw);
      total=j.total_count||cards.length;
    }catch(e2){ throw e2; }
  }
  return {cards, total_count:total};
}

const EX={q:'',skip:0,total:0,items:[],prices:{},imgs:new Map()};
async function csImageData(id){
  if(!id)return null;
  if(EX.imgs.has(id))return EX.imgs.get(id);
  const ck='img:'+id;
  try{
    const hit=await idb.netGet(ck);
    if(hit&&hit.j!=null&&(Date.now()-hit.t)<CS_STALE_MAX){
      CS_STATS.hits++;
      if(!csCacheFresh(hit,CS_TTL_FREE))CS_STATS.stale++;
      EX.imgs.set(id,hit.j);
      return hit.j;
    }
  }catch(e){}
  try{  /* image endpoint is free per CardSight docs — bypass the local billed-call counter */
    const key=csKey();
    if(!key)return null;
    CS_STATS.free++;
    const r=await fetch(CS_BASE+'/v1/images/cards/'+id+'?format=json&default=true',{headers:{'X-API-Key':key}});
    if(!r.ok)return null;
    const j=await r.json();
    const d=(j&&j.data)!=null?j.data:j;
    EX.imgs.set(id,d);
    try{await idb.netPut(ck,{t:Date.now(),j:d});}catch(e){}
    return d;
  }catch(e){return null;}
}
function csImgSrc(d){
  if(!d)return '';
  if(typeof d==='string'){
    if(d.startsWith('data:')||d.startsWith('http')||d.startsWith('blob:'))return d;
    if(/^[A-Za-z0-9+/=\s]+$/.test(d.slice(0,80))&&d.length>80)return 'data:image/jpeg;base64,'+d.replace(/\s/g,'');
    return d;
  }
  const u=d.url||d.imageUrl||d.front||d.src||d.image||d.default||'';
  if(u)return u;
  if(d.base64||d.data){
    const b=String(d.base64||d.data);
    return b.startsWith('data:')?b:'data:image/jpeg;base64,'+b.replace(/\s/g,'');
  }
  return '';
}
/* Blob URLs paint much more reliably on iPhone than giant data: URLs */
const _blobByKey=new Map();
function csDisplayUrl(d){
  const raw=csImgSrc(d);
  if(!raw)return '';
  if(raw.startsWith('blob:')||raw.startsWith('http'))return raw;
  if(!raw.startsWith('data:'))return raw;
  const key=raw.length+':'+(raw.slice(5,40));
  if(_blobByKey.has(key))return _blobByKey.get(key);
  try{
    const comma=raw.indexOf(',');
    const meta=raw.slice(0,comma);
    const b64=raw.slice(comma+1);
    const mime=(/data:([^;]+)/.exec(meta)||[])[1]||'image/jpeg';
    const bin=atob(b64);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:mime}));
    _blobByKey.set(key,url);
    return url;
  }catch(e){return raw;}
}
function setImgEl(el,url){
  if(!el||!url)return false;

  const shine=el.querySelector('.shine');
  const img=document.createElement('img');

}

  }catch(e){

    if(body) body.innerHTML=`<div class="empty soft" style="grid-column:1/-1;color:var(--red)">${esc(m)}</div>`;

}

async function paintExImages(){
  const items=EX.items||[];
  let i=0;
  async function worker(){
    while(i<items.length){
      const idx=i++;
      const x=items[idx];
      const el=$('ex-'+idx);
      if(!el||!x||!x.id)continue;
      try{
        const url=csDisplayUrl(await csImageData(x.id));
        if(url) setImgEl(el,url);
        else {el.classList.remove('thumbLoad');el.textContent='🃏';}
      }catch(e){el.classList.remove('thumbLoad');}
    }
  }
  const n=Math.min(4, Math.max(1, items.length));
  await Promise.all(Array.from({length:n},()=>worker()));
}
async function exLoadPrices(){
  if(!EX.items.length)return;
  const b=$('exPrices'); if(b){b.disabled=true;b.textContent='…';}
  try{
    const map=await csBulkPriceByIds(EX.items.map(x=>x.id));
    let n=0; for(const id of Object.keys(map)){EX.prices[id]=map[id];n++;}
    paintEx();

  }catch(e){showToast(e.message||'Pricing failed');}

}

    return addFromCatalogAdvanced(x,status,opts||{});
  const nc={id:uid(),created:Date.now(),status,qty:1,prices:[],
    rookie:(x.attributes||[]).some(a=>/^rc$|rookie/i.test(a))};

  nc.year=x.releaseYear||'';
  nc.setName=[x.releaseName,x.setName&&!/^base\b/i.test(x.setName)?x.setName:''].filter(Boolean).join(' ').trim();
  nc.num=x.number||'';
  nc.csId=x.id||'';
  nc.brand=x.manufacturerName||x.brand||nc.brand||'';
  if(x.releaseId)nc.csReleaseId=x.releaseId;
  if(x.setId)nc.csSetId=x.setId;
  const v=EX.prices[x.id];
  if(v!=null)nc.prices.push({d:today(),v:+(+v).toFixed(2),src:'cardsight'});
  state.cards.push(nc);save();
  try{
    const url=csImgSrc(await csImageData(x.id));
    if(url){
      if(url.startsWith('data:')){nc.imgId=nc.id;imgCache.set(nc.id,url);await idb.put(nc.id,url);save();}
      else {nc.imgUrl=url;save();}
    }
  }catch(e){}
  showToast((status==='want'?'Want: ':'Have: ')+(nc.player||'card'));
  return nc;
}

        let s=0;

  if(preset&&typeof preset==='object'){
    if(preset.player) c.player=preset.player;

async function handleImportFile(f){
  const buf=await f.arrayBuffer();
  const u8=new Uint8Array(buf);
  let mode,payload;
  if(u8[0]===0x50&&u8[1]===0x4b){mode='xlsx';}
  else{
    payload=new TextDecoder().decode(u8);
    const t=payload.trimStart();
    if(t.startsWith('{'))mode='json';
    else if(t.includes('<Workbook'))mode='ssml';
    else mode='csv';
  }
  try{
    if(mode==='json'){
      const j=JSON.parse(payload);
      if(!j||!Array.isArray(j.cards))throw new Error('bad backup');
      const replace=confirm(`Backup has ${j.cards.length} cards. OK = REPLACE current ${state.cards.length} · Cancel = merge new only`);
      if(replace)state.cards=j.cards;
      else{const ids=new Set(state.cards.map(c=>c.id));j.cards.forEach(c=>{if(!ids.has(c.id))state.cards.push(c);});}
      if(j.photos)for(const k in j.photos){await idb.put(k,j.photos[k]);imgCache.set(k,j.photos[k]);}
      save();render();showToast('Backup restored ✔');return;
    }
    let sheets;
    if(mode==='xlsx')sheets=await parseXlsx(buf);
    else if(mode==='ssml')sheets=parseSpreadsheetML(payload);
    else sheets={Sheet1:csvParse(payload)};
    const r=mapAllSheets(sheets);
    if(!r.cards.length&&!r.prices.length)return alert('No recognizable columns found.\n\nTip: TCDB / spreadsheet exports work if the first row has headers like:\nPlayer (or Name), Year, Set, # / Card Number, Brand, Grade, Qty, Value…\n\nOr restore a Card Vault Backup JSON.');
    const keys=new Map(state.cards.map(c=>[keyOf(c),c]));
    let added=0,dup=0,priced=0;
    for(const c of r.cards){
      const k=keyOf(c);
      if(keys.has(k)){dup++;continue;}
      c.id=uid();c.created=Date.now();
      FIELDS.forEach(f2=>{if(!(f2 in c))c[f2]=f2==='qty'?1:'';});
      state.cards.push(c);keys.set(k,c);added++;
    }
    for(const p of r.prices){
      const c2=keys.get(p.key);
      if(c2&&p.v>0){c2.prices=c2.prices||[];
        if(!c2.prices.some(x=>x.d===p.d&&x.v===p.v)){c2.prices.push({d:p.d||today(),v:p.v,src:'import'});priced++;}
        c2.prices.sort((a,b)=>a.d<b.d?-1:1);}
    }
    save();render();
    alert(`Imported ✔\n· ${added} new cards\n· ${dup} duplicates skipped\n· ${priced} price points`+
      (r.unmapped.length?`\n· Ignored columns: ${r.unmapped.slice(0,8).join(', ')}`:'')+
      `\n\nTip: open a card → Auto-match to link catalog photos when year/brand/# are filled.`);
  }catch(e){alert('Import failed: '+e.message);}
}

async function ghApi(path,opts={}){
  const {token,repo}=ghCreds();
  if(!token||!repo) throw new Error('Menu → GitHub setup first (repo + token)');
  const r=await fetch('https://api.github.com/repos/'+repo+path,{
    ...opts,
    headers:{
      'Accept':'application/vnd.github+json',
      'Authorization':'Bearer '+token,
      'X-GitHub-Api-Version':'2022-11-28',
      ...(opts.headers||{})
    }
  });
  const t=await r.text();
  let j=null; try{j=JSON.parse(t);}catch(e){}
  if(!r.ok) throw new Error((j&&j.message)||('GitHub '+r.status));
  return j;
}
function ghContentPath(path){
  return '/contents/'+String(path||'card-vault.json').split('/').filter(Boolean).map(encodeURIComponent).join('/');
}
async function ghPushVault(){
  try{
    const {path}=ghCreds();
    const body={cards:state.cards,meta:{...state.meta,lastBackup:Date.now()},v:2};
    if(body.meta){ delete body.meta.ghToken; }
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(body))));
    let sha;
    try{
      const cur=await ghApi(ghContentPath(path));
      sha=cur&&cur.sha;
    }catch(e){ /* file may not exist yet */ }
    const payload={message:'Card Vault backup '+today(),content};
    if(sha) payload.sha=sha;
    await ghApi(ghContentPath(path),{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    state.meta.lastBackup=Date.now();save();
    showToast('Pushed to GitHub ✔');
    render();
  }catch(e){alert('GitHub push failed: '+(e.message||e));}

async function ghPullVault(){
  try{
    const {path}=ghCreds();
    const j=await ghApi(ghContentPath(path));
    if(!j||!j.content) throw new Error('Empty file');
    const raw=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    const data=JSON.parse(raw);
    if(!data||!Array.isArray(data.cards)) throw new Error('Not a Card Vault backup');

    save();render();

/** One-tap vault fill: free photos + PSA pop, then bulk prices (≤100 IDs / 1 billed call). */
window.fillVaultData=async function fillVaultData({
  maxPhoto=120,
  maxLink=12,
  maxPriceBatches=8,
  link=true,
  silent=false
}={}){
  if(typeof csKey!=='function'||!csKey()){
    if(!silent)showToast('CardSight key needed to fill catalog data');
    return {photos:0,linked:0,priced:0,pop:0};
  }
  if(state.meta._fillBusy){ if(!silent)showToast('Already filling…'); return null; }
  state.meta._fillBusy=true;
  const out={photos:0,linked:0,priced:0,pop:0,callsEst:0};
  try{
    if(!silent)showToast('Filling photos · pop · prices…');

    /* 1) Free photos */
    if(typeof fillMissingPhotos==='function'){
      out.photos=await fillMissingPhotos({concurrency:6,max:maxPhoto,silent:true})||0;
    }

    /* 2) Free PSA pop onto cards missing it */
    const needPop=state.cards.filter(c=>c.csId&&c.status!=='sold'&&c.psaPop==null).slice(0,80);
    for(const c of needPop){
      try{
        const pop=await csCardPop(c.csId);
        if(pop&&pop.total_population!=null){
          c.psaPop=+pop.total_population;
          out.pop++;
        }
      }catch(e){}
    }

    /* 3) Link unlinked cards that already have year/brand/# (billed search, capped) */
    if(link && typeof csSearchBaseballCards==='function'){
      const needLink=state.cards.filter(c=>c.status!=='sold'&&!c.csId&&(c.player||'').trim().length>=2&&(c.year||c.brand||c.num))
        .slice(0,maxLink);
      for(const c of needLink){
        try{
          const bits=[c.player,c.year,c.brand,c.num?('#'+c.num):''].filter(Boolean).join(' ');
          const j=await csSearchBaseballCards(bits,{take:8,skip:0});
          out.callsEst++;
          const cards=j.cards||[];
          if(!cards.length)continue;
          const scoreHit=h=>{
            let s=0;
            const hy=String(h.year||h.releaseYear||'');
            const hb=String(h.brand||h.manufacturerName||'').toLowerCase();
            const hn=String(h.num||h.number||'').replace(/^#/,'').toLowerCase();
            const cy=String(c.year||''), cb=String(c.brand||'').toLowerCase(), cn=String(c.num||'').replace(/^#/,'').toLowerCase();
            if(cy&&hy&&cy===hy)s+=50;
            if(cb&&hb&&(hb.includes(cb)||cb.includes(hb)))s+=35;
            if(cn&&hn&&cn===hn)s+=40;
            return s;
          };
          const hit=[...cards].sort((a,b)=>scoreHit(b)-scoreHit(a))[0];
          if(scoreHit(hit)<35 && (c.year||c.brand||c.num)) continue;
          const id=hit.cardId||hit.id;
          if(!id)continue;
          c.csId=id;
          if(!c.year&&(hit.year||hit.releaseYear))c.year=String(hit.year||hit.releaseYear).slice(0,4);
          if(!c.brand&&(hit.brand||hit.manufacturerName))c.brand=hit.brand||hit.manufacturerName;
          if(!c.setName&&hit.setName)c.setName=hit.setName;
          if(!c.num&&(hit.num||hit.number))c.num=hit.num||hit.number;
          out.linked++;
        }catch(e){}
      }
    }

    /* 4) Bulk price: never-priced first, then stale — soft cache = often $0 billed */
    const needPrice=state.cards.filter(c=>c.csId&&c.status!=='sold'&&priceAgeDays(c)>=14)
      .sort((a,b)=>{
        const a0=!(a.prices&&a.prices.length), b0=!(b.prices&&b.prices.length);
        if(a0!==b0)return a0?-1:1;
        return valueOf(b)-valueOf(a);
      });
    const ids=[...new Set(needPrice.map(c=>c.csId))];
    for(let b=0;b<maxPriceBatches && b*100<ids.length;b++){
      const slice=ids.slice(b*100,(b+1)*100);
      try{
        const map=await csBulkPriceByIds(slice,{force:false});
        out.callsEst++; /* at most 1 if cache miss */
        for(const c of needPrice){
          if(slice.includes(c.csId)&&map[c.csId]!=null&&applyCsPrice(c,map[c.csId],'cardsight'))
            out.priced++;
        }
      }catch(e){ break; }
    }

    /* 5) Free MLB headshots + season/career chips */
    if(typeof enrichPlayerFields==='function'||typeof mlbEnrichCard==='function'){
      const needMlb=state.cards.filter(c=>c.player&&c.status!=='sold'&&(!c.mlbId||!c.mlbStats)).slice(0,50);
      for(const c of needMlb){
        try{
          if(typeof enrichPlayerFields==='function') await enrichPlayerFields(c,c.player);
          else if(typeof mlbEnrichCard==='function') await mlbEnrichCard(c);
          if(typeof ensureMlbHeadshot==='function') ensureMlbHeadshot(c);
        }catch(e){}
      }
    }

    save();
    state.meta.lastFillData=Date.now();
    save();
    if(typeof logActivity==='function')
      logActivity('fill','photos '+out.photos+' · linked '+out.linked+' · priced '+out.priced+' · pop '+out.pop);
    if(!silent){
      showToast(`Filled ✔ 🖼${out.photos} · 🔗${out.linked} · 💰${out.priced} · PSA ${out.pop}`);
      if(tab==='dash'||tab==='have'||tab==='want')render();
    }
    return out;
  }finally{
    state.meta._fillBusy=false;
  }
};

const MLB_TEAMS={
  ARI:'Diamondbacks',ATL:'Braves',BAL:'Orioles',BOS:'Red Sox',CHC:'Cubs',CIN:'Reds',CLE:'Guardians',
  COL:'Rockies',CWS:'White Sox',CHW:'White Sox',DET:'Tigers',HOU:'Astros',KC:'Royals',KCR:'Royals',
  LAA:'Angels',LAD:'Dodgers',MIA:'Marlins',MIL:'Brewers',MIN:'Twins',NYM:'Mets',NYY:'Yankees',
  OAK:'Athletics',ATH:'Athletics',PHI:'Phillies',PIT:'Pirates',SD:'Padres',SDP:'Padres',SEA:'Mariners',
  SF:'Giants',SFG:'Giants',STL:'Cardinals',TB:'Rays',TBR:'Rays',TEX:'Rangers',TOR:'Blue Jays',
  WSH:'Nationals',WAS:'Nationals',WSN:'Nationals'
};
const BRAND_HINT=/^(Topps|Bowman|Upper Deck|Panini|Donruss|Fleer|Leaf|Score|Sage|Stadium Club|Heritage|Gypsy Queen|Allen\s*&\s*Ginter|Chrome|Prizm|Select|Mosaic|Optic)/i;

window.csSplitCardName=function csSplitCardName(name){
  const n=String(name||'').trim();
  const m=n.match(/^(.+?)\s+[—\-–]\s+(.+)$/);
  if(m&&m[2].trim().split(/\s+/).length>=2)return{player:m[2].trim(),subtitle:m[1].trim()};
  return{player:n,subtitle:''};
};
window.csInferBrand=function csInferBrand(x){
  if(x.manufacturerName)return x.manufacturerName;
  if(x.brand)return x.brand;
  if(x.manufacturer)return x.manufacturer;
  const blob=[x.releaseName,x.setName].filter(Boolean).join(' ');
  const m=blob.match(BRAND_HINT);
  return m?m[1].replace(/\s+/g,' ').trim():'';
};
window.csParseAttributes=function csParseAttributes(attrs){
  const out={team:'',rookie:false,flags:[],raw:[]};
  for(const a of (attrs||[])){
    const s=String(a||'').trim(); if(!s)continue;
    out.raw.push(s);
    if(/^rc$|rookie/i.test(s)){out.rookie=true;continue;}
    const mlb=s.match(/^MLB-([A-Z]{2,3})$/i);
    if(mlb){
      const code=mlb[1].toUpperCase();
      out.team=MLB_TEAMS[code]||code;
      continue;
    }
    if(/^(AU|AUTO|AUTOGRAPH)/i.test(s)){out.flags.push('Autograph');continue;}
    if(/^(MEM|RELIC|PATCH|JSY|JERSEY)/i.test(s)){out.flags.push('Memorabilia');continue;}
    if(/^(SSP|SP|SHORT\s*PRINT)/i.test(s)){out.flags.push(/^SSP/i.test(s)?'SSP':'SP');continue;}
    if(/^(1st|FIRST)\b/i.test(s)){out.flags.push('1st Bowman');continue;}
    if(/^[A-Z]{2,3}$/.test(s)&&MLB_TEAMS[s]){out.team=MLB_TEAMS[s];continue;}
    if(!/^(MLB|NBA|NFL|NHL)/i.test(s))out.flags.push(s);
  }
  return out;
};

/** Pull every field CardSight actually has for this card ID (detail + release brand). */
window.csEnrichCatalogCard=async function csEnrichCatalogCard(x){
  if(!x)return x;
  const id=x.id||x.cardId;
  let full=Object.assign({},x);
  if(id){
    try{
      const d=await csFetchCached('/v1/catalog/cards/'+id,{},{ttlMs:CS_TTL_CARD});
      if(d&&typeof d==='object')full=Object.assign({},full,d,{id:d.id||id});
    }catch(e){}
  }
  if(!full.manufacturerName&&full.releaseId){
    try{
      const rel=await csFetchCached('/v1/catalog/releases/'+full.releaseId,{},{ttlMs:CS_TTL_CAT});
      if(rel){
        if(rel.name&&!full.releaseName)full.releaseName=rel.name;
        if(rel.year&&!full.releaseYear)full.releaseYear=rel.year;
        /* manufacturer endpoint often 404 — brand inferred from release name */
      }
    }catch(e){}
  }
  if(!full.manufacturerName)full.manufacturerName=csInferBrand(full);
  const split=csSplitCardName(full.name||full.player||'');
  full._playerClean=split.player;
  full._subtitle=split.subtitle;
  full._attr=csParseAttributes(full.attributes||x.attributes||[]);
  if(full.parallelName&&!full.parallels){
    /* search hits sometimes include parallelName only */
    full._searchParallel=full.parallelName;
  }
  return full;
};

window.csHydrateCard=function csHydrateCard(nc,x,par){
  FIELDS.forEach(f=>{if(!(f in nc))nc[f]=f==='qty'?1:'';});
  const attr=x._attr||csParseAttributes(x.attributes||[]);
  const split=x._playerClean?{player:x._playerClean,subtitle:x._subtitle||''}:csSplitCardName(x.name||x.player||'');
  nc.sport=BB_SPORT;
  nc.player=split.player||x.name||x.player||nc.player||'';
  nc.year=String(x.releaseYear||x.year||nc.year||'').slice(0,4);
  const setBits=[x.releaseName,x.setName&&!/^base\b/i.test(String(x.setName||''))?x.setName:''].filter(Boolean);
  nc.setName=setBits.join(' ').trim()||nc.setName||'';
  nc.num=x.number||x.num||nc.num||'';
  nc.csId=x.id||x.cardId||nc.csId||'';
  nc.brand=csInferBrand(x)||nc.brand||'';
  if(x.releaseId)nc.csReleaseId=x.releaseId;
  if(x.setId)nc.csSetId=x.setId;
  nc.rookie=!!(nc.rookie||attr.rookie||(x.attributes||[]).some(a=>/^rc$|rookie/i.test(a)));
  if(attr.team)nc.team=attr.team;
  else if(!nc.team){
    const teamish=(x.attributes||[]).find(a=>/^MLB-/i.test(a)||(MLB_TEAMS[String(a||'').toUpperCase()]));
    if(teamish){
      const code=String(teamish).replace(/^MLB-/i,'').toUpperCase();
      nc.team=MLB_TEAMS[code]||code;
    }
  }
  if(par&&par.id){
    nc.variant=par.name||nc.variant||'';
    nc.csParallelId=par.id;
    if(par.numberedTo!=null&&par.numberedTo!=='')nc.serial='/'+par.numberedTo;
  }else if(x._searchParallel&&!nc.variant){
    nc.variant=x._searchParallel;
    nc.csParallelId='';
  }else{
    nc.csParallelId=nc.csParallelId||'';
    if(!nc.variant)nc.variant='';
  }
  /* notes: only add facts we know — never invent */
  const noteBits=[];
  if(split.subtitle)noteBits.push(split.subtitle);
  if(attr.flags.length)noteBits.push(attr.flags.join(' · '));
  if(par&&par.numberedTo)noteBits.push('Print run /'+par.numberedTo);
  else if(x.numberedTo)noteBits.push('Print run /'+x.numberedTo);
  if(noteBits.length){
    const add=noteBits.join(' · ');
    if(!nc.notes)nc.notes=add;
    else if(!String(nc.notes).includes(noteBits[0]))nc.notes=String(nc.notes).trim()+(String(nc.notes).trim()?' · ':'')+add;
  }
  return nc;
};

window.addFromCatalogAdvanced=async function addFromCatalogAdvanced(x,status,{parallel,skipPicker,skipDup,quiet}={}){
  if(!x)return null;
  /* Always hydrate from full catalog detail so empty list rows still populate everything available */
  if(!quiet)showToast('Filling card details…');
  x=await csEnrichCatalogCard(x);
  let par=parallel;
  if(par===undefined&&!skipPicker){
    const pick=await openParallelPicker(x,status);
    if(pick===undefined)return null;
    par=pick;
  }
  const existing=findOwned(x.id,par&&par.id);
  if(existing&&!skipDup){
    existing.qty=(+existing.qty||1)+1;save();
    if(typeof confettiBurst==='function')confettiBurst();
    showToast('＋ Qty now '+existing.qty+' · '+ (existing.player||'card')+(existing.variant?' · '+existing.variant:''), ()=>{
      existing.qty=Math.max(1,(+existing.qty||1)-1);save();render();
    });
    render();
    return existing;
  }
  const nc={id:uid(),created:Date.now(),status,qty:1,prices:[],rookie:false};
  csHydrateCard(nc,x,par||null);
  const v=(typeof EX!=='undefined'&&EX.prices)?EX.prices[x.id]:null;
  if(v!=null)nc.prices.push({d:today(),v:+(+v).toFixed(2),src:'cardsight'});
  state.cards.push(nc);save();
  /* photo + MLB team/id + market price — whatever is available, in parallel */
  const jobs=[];
  jobs.push((async()=>{
    try{
      const url=csImgSrc(await csImageData(x.id));
      if(url){
        if(url.startsWith('data:')){nc.imgId=nc.id;imgCache.set(nc.id,url);await idb.put(nc.id,url);}
        else nc.imgUrl=url;
        save();
      }
    }catch(e){}
  })());
  if(typeof enrichPlayerFields==='function'&&nc.player){
    jobs.push(enrichPlayerFields(nc,nc.player).catch(()=>{}));
  }
  if(nc.csId&&!nc.prices.length){
    jobs.push(csBulkPriceByIds([nc.csId]).then(map=>{
      if(map[nc.csId]!=null&&applyCsPrice(nc,map[nc.csId],'cardsight'))save();
    }).catch(()=>{}));
  }
  await Promise.all(jobs);
  if(!quiet){
    if(typeof confettiBurst==='function')confettiBurst();
    const bits=[nc.player,nc.year,nc.brand||nc.setName,nc.num?'#'+nc.num:'',nc.variant,nc.team,nc.rookie?'RC':''].filter(Boolean);
    showToast((status==='want'?'⭐ Wanted: ':'✔ Added: ')+bits.slice(0,4).join(' · '));
  }
  return nc;
};

  html+='</div>';
  return html;
};

window.autoRefreshPricesIfNeeded=async function autoRefreshPricesIfNeeded(){
  if(!csKey()||state.meta._priceBusy)return;
  /* Prefer never-priced; use soft cache (force:false) so repeats stay free. */
  const need=state.cards.filter(c=>c.csId&&c.status==='have'&&priceAgeDays(c)>=14)
    .sort((a,b)=>{
      const a0=!(a.prices&&a.prices.length), b0=!(b.prices&&b.prices.length);
      if(a0!==b0)return a0?-1:1;
      return valueOf(b)-valueOf(a);
    }).slice(0,100);
  if(!need.length)return;
  const last=state.meta.lastAutoPrice||0;
  if(Date.now()-last<6*3600e3)return;
  state.meta._priceBusy=true;
  try{
    const map=await csBulkPriceByIds(need.map(c=>c.csId),{force:false});
    let n=0;
    for(const c of need){if(map[c.csId]!=null&&applyCsPrice(c,map[c.csId],'cardsight'))n++;}
    state.meta.lastAutoPrice=Date.now();save();
    if(n)showToast('💰 Filled '+n+' values (cached when possible)');
  }catch(e){}
  finally{state.meta._priceBusy=false;}
};

window.setsLoadCards=async function setsLoadCards(reset){

  const masterDenom=parTypes?tot*(parTypes+1):tot;
  const masterHave=ownParallelCountInSet(s.id);
  const masterPct=masterDenom?Math.min(100,Math.round(masterHave/masterDenom*100)):pct;

  }).join('');
  body.querySelectorAll('[data-h]').forEach(b=>b.onclick=async()=>{

  body.querySelectorAll('[data-w]').forEach(b=>b.onclick=async()=>{
    await addFromCatalogAdvanced(SETS.cards[+b.dataset.w],'want');
    setsPaintChecklist();
  });
  SETS.cards.forEach(async(x,i)=>{
    const el=$('ck-'+i);if(!el)return;

window.boothFind=async function boothFind(){
  const year=($('bnYear')&&$('bnYear').value.trim())||'';
  const set=($('bnSet')&&$('bnSet').value.trim())||'';
  const num=($('bnNum')&&$('bnNum').value.trim())||'';
  if(!set||!num)return showToast('Need set name and card #');
  const hint=$('bnHint'); if(hint)hint.textContent='Searching…';
  try{
    const q=[year,set,('#'+num),'baseball'].filter(Boolean).join(' ');
    const j=await csFetchCached('/v1/catalog/search?type=card&take=8&q='+encodeURIComponent(q),{},{ttlMs:CS_TTL_CAT});
    let cards=(j.results||[]).map(r=>({
      id:r.id,name:r.name,releaseYear:r.year,releaseName:r.releaseName,setName:r.setName||r.name,
      number:num,manufacturerName:r.manufacturerName
    }));
    if(!cards.length){
      const j2=await csSearchBaseballCards([year,set,num].filter(Boolean).join(' '),{take:12});
      cards=(j2.cards||[]).filter(c=>String(c.number||'')===String(num)||String(c.number||'').replace(/^0+/,'')===String(num).replace(/^0+/,''));
      if(!cards.length)cards=j2.cards||[];
    }
    if(!cards.length){if(hint)hint.textContent='No match — try fewer words';return showToast('No card found for that #');}
    let x=cards.find(c=>String(c.number||'')===String(num))||cards[0];
    try{
      const d=await csFetchCached('/v1/catalog/cards/'+x.id,{},{ttlMs:CS_TTL_CARD});
      if(d)Object.assign(x,d);
    }catch(e){}
    if(hint)hint.textContent='Found: '+(x.name||'')+' #'+(x.number||num);
    const status=confirm('Add to Have?\n\nOK = Have · Cancel = Want')?'have':'want';
    await addFromCatalogAdvanced(x,status);
  }catch(e){showToast('Booth search failed: '+e.message);}
};

window.PCAT={q:'',cards:[],total:0,year:'',brand:'',setName:'',loading:false};

window.csCardBrand=function csCardBrand(x){
  return (typeof csInferBrand==='function'?csInferBrand(x):'')||x.manufacturerName||x.releaseName||'Other';
};
window.loadPlayerCatalog=async function loadPlayerCatalog(player,{append=false}={}){
  const q=String(player||'').trim();
  if(q.length<2){PCAT.q='';PCAT.cards=[];PCAT.total=0;return PCAT;}
  if(!append || PCAT.q!==q){PCAT.q=q;PCAT.cards=[];PCAT.year='';PCAT.brand='';PCAT.setName='';}
  PCAT.loading=true;
  const skip=PCAT.cards.length;
  const j=await csSearchBaseballCards(q,{take:48,skip});
  const seen=new Set(PCAT.cards.map(c=>c.id));
  for(const c of (j.cards||[])){ if(c.id&&!seen.has(c.id)){PCAT.cards.push(c);seen.add(c.id);} }
  PCAT.total=j.total_count||PCAT.cards.length;
  PCAT.loading=false;
  return PCAT;
};
window.pcatFiltered=function pcatFiltered(){
  let list=PCAT.cards.slice();
  if(PCAT.year)list=list.filter(x=>String(x.releaseYear||x.year||'')===String(PCAT.year));
  if(PCAT.brand)list=list.filter(x=>csCardBrand(x)===PCAT.brand);
  if(PCAT.setName)list=list.filter(x=>{
    const sn=[x.releaseName,x.setName&&!/^base\b/i.test(String(x.setName||''))?x.setName:''].filter(Boolean).join(' ').trim()||x.setName||'';
    return sn===PCAT.setName;
  });
  return list;
};
window.pcatOptions=function pcatOptions(){
  const base=PCAT.cards;
  const years=[...new Set(base.map(x=>String(x.releaseYear||x.year||'')).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  let list=base;
  if(PCAT.year)list=list.filter(x=>String(x.releaseYear||x.year||'')===String(PCAT.year));
  const brands=[...new Set(list.map(csCardBrand).filter(Boolean))].sort();
  if(PCAT.brand)list=list.filter(x=>csCardBrand(x)===PCAT.brand);
  const sets=[...new Set(list.map(x=>{
    return [x.releaseName,x.setName&&!/^base\b/i.test(String(x.setName||''))?x.setName:''].filter(Boolean).join(' ').trim()||x.setName||'Set';
  }).filter(Boolean))].sort();
  return {years,brands,sets,cards:pcatFiltered()};
};

  const byPlayer={};
  for(const c of have){
    const k=c.player||'—';
    byPlayer[k]=(byPlayer[k]||0)+valueOf(c)*(+c.qty||1);
  }
  const topPlayer=Object.entries(byPlayer).sort((a,b)=>b[1]-a[1])[0];
  const conc=val&&topPlayer?Math.round(topPlayer[1]/val*100):0;
  const graded=have.filter(c=>c.grade&&!/^raw$/i.test(String(c.grade))).length;
  const unpriced=have.filter(c=>latestPrice(c)==null).length;
  const stale=have.filter(c=>c.csId&&priceAgeDays(c)>=3).length;
  const deals=want.filter(dealHit).length;
  const roi=have.filter(c=>+c.cost>0&&latestPrice(c)!=null)
    .map(c=>({c,roi:((latestPrice(c)-c.cost)/c.cost)*100,pl:(latestPrice(c)-c.cost)*(+c.qty||1)}))
    .sort((a,b)=>b.pl-a.pl);
  const week=have.map(c=>{
    const d=typeof deltaDays==='function'?deltaDays(c,7):null;
    return d==null?null:{c,d};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
  return {
    have:have.length,want:want.length,val,cost,pl:val-cost,
    topPlayer:topPlayer?topPlayer[0]:'—',conc,graded,gradedPct:have.length?Math.round(graded/have.length*100):0,
    unpriced,stale,deals,
    roiTop:roi.slice(0,5),
    movers7:week.slice(0,5),
    activity:(state.meta&&state.meta.activity)||[]
  };
};

/* Card Vault — MLB career stats + public data/mlb-career.json (not private collection) */
(function(){
'use strict';
if(typeof window==='undefined')return;

const MLB_API='https://statsapi.mlb.com/api/v1';
const MLB_STATS_TTL=30*864e5;
const MLB_JSON_URL='./data/mlb-career.json';

window.MLB_CAREER={v:1,byId:{},byName:{},loaded:false};

window.mlbPickStat=function mlbPickStat(payload, group){
  const blocks=(payload&&payload.stats)||[];
  const hit=blocks.find(s=>String((s.group&&s.group.displayName)||'').toLowerCase()===group)
    ||blocks.find(s=>String((s.type&&s.type.displayName)||'').toLowerCase()==='career');
  const split=(hit&&hit.splits&&hit.splits[0])||null;
  return split&&split.stat?split.stat:null;
};

function mlbNameKey(n){
  return String(n||'').toLowerCase().replace(/\./g,'').replace(/\s+/g,' ').trim();
}
window.mergeMlbCareerFile=function mergeMlbCareerFile(j){
  if(!j||typeof j!=='object')return;
  MLB_CAREER.byId=Object.assign(MLB_CAREER.byId||{}, j.byId||{});
  const names=Object.assign({}, j.byName||{});
  /* alias keys without punctuation so "Ken Griffey Jr" hits "Ken Griffey Jr." */
  for(const [k,id] of Object.entries(names)){
    const nk=mlbNameKey(k);
    if(nk&&!names[nk])names[nk]=id;
  }
  MLB_CAREER.byName=Object.assign(MLB_CAREER.byName||{}, names);
  MLB_CAREER.v=j.v||1;
  MLB_CAREER.updated=j.updated||MLB_CAREER.updated;
  MLB_CAREER.count=Object.keys(MLB_CAREER.byId).length;
  MLB_CAREER.loaded=true;
};

window.loadMlbCareerJson=async function loadMlbCareerJson(){
  try{
    const r=await fetch(MLB_JSON_URL,{cache:'no-cache'});
    if(!r.ok)return false;
    mergeMlbCareerFile(await r.json());
    return true;
  }catch(e){return false;}
};

window.mlbLookupCached=function mlbLookupCached(c){
  if(!c)return null;
  if(c.mlbId&&MLB_CAREER.byId[String(c.mlbId)])return MLB_CAREER.byId[String(c.mlbId)];
  const n=mlbNameKey(c.player);
  const id=n&&(MLB_CAREER.byName[n]||MLB_CAREER.byName[String(c.player||'').trim().toLowerCase()]);
  if(id&&MLB_CAREER.byId[id])return MLB_CAREER.byId[id];
  return null;
};

window.mlbCachePut=function mlbCachePut(summary){
  if(!summary||!summary.mlbId)return;
  const id=String(summary.mlbId);
  MLB_CAREER.byId[id]={
    mlbId:summary.mlbId,
    fullName:summary.fullName||'',
    pos:summary.pos||'',
    team:summary.team||'',
    bats:summary.bats||'',
    throws:summary.throws||'',
    birthDate:summary.birthDate||'',
    debutDate:summary.debutDate||'',
    hitting:summary.hitting||null,
    pitching:summary.pitching||null,
    seasonYear:summary.seasonYear||'',
    seasonHitting:summary.seasonHitting||null,
    seasonPitching:summary.seasonPitching||null
  };
  if(summary.fullName)MLB_CAREER.byName[String(summary.fullName).toLowerCase()]=id;
  MLB_CAREER.count=Object.keys(MLB_CAREER.byId).length;
};

window.mlbFetchPerson=async function mlbFetchPerson(mlbId){
  const id=String(mlbId||'').trim();
  if(!id)return null;
  const ck='mlb:person:'+id;
  try{
    const hit=await idb.netGet(ck);
    if(hit&&hit.j!=null&&(Date.now()-hit.t)<MLB_STATS_TTL)return hit.j;
  }catch(e){}
  const r=await fetch(MLB_API+'/people/'+encodeURIComponent(id)+'?hydrate=currentTeam');
  if(!r.ok)throw new Error('MLB person '+r.status);
  const j=await r.json();
  const p=(j.people&&j.people[0])||null;
  if(p)try{await idb.netPut(ck,{t:Date.now(),j:p});}catch(e){}
  return p;
};

window.mlbFetchCareerGroup=async function mlbFetchCareerGroup(mlbId, group){
  const id=String(mlbId||'').trim();
  if(!id)return null;

  try{
    const hit=await idb.netGet(ck);
    if(hit&&hit.j!=null&&(Date.now()-hit.t)<MLB_STATS_TTL)return mlbPickStat(hit.j, group);
  }catch(e){}
  const r=await fetch(MLB_API+'/people/'+encodeURIComponent(id)+'/stats?stats=career&group='+encodeURIComponent(group));
  if(!r.ok)throw new Error('MLB stats '+r.status);
  const j=await r.json();
  try{await idb.netPut(ck,{t:Date.now(),j});}catch(e){}
  return mlbPickStat(j, group);
};

/** Season line for the card year (free MLB Stats API). */
window.mlbFetchSeasonGroup=async function mlbFetchSeasonGroup(mlbId, group, season){
  const id=String(mlbId||'').trim();
  const yr=String(season||'').replace(/\D/g,'').slice(0,4);
  if(!id||yr.length!==4)return null;
  const ck='mlb:season:'+group+':'+id+':'+yr;
  try{
    const hit=await idb.netGet(ck);
    if(hit&&hit.j!=null&&(Date.now()-hit.t)<MLB_STATS_TTL)return mlbPickStat(hit.j, group);
  }catch(e){}
  const r=await fetch(MLB_API+'/people/'+encodeURIComponent(id)+'/stats?stats=season&season='+encodeURIComponent(yr)+'&group='+encodeURIComponent(group));
  if(!r.ok)return null;
  const j=await r.json();
  try{await idb.netPut(ck,{t:Date.now(),j});}catch(e){}
  return mlbPickStat(j, group);
};

function mlbNormHit(hitting){
  if(!hitting||!(+hitting.atBats||0))return null;
  return {
    g:+hitting.gamesPlayed||0, ab:+hitting.atBats||0, h:+hitting.hits||0,
    hr:+hitting.homeRuns||0, rbi:+hitting.rbi||0, sb:+hitting.stolenBases||0,
    bb:+hitting.baseOnBalls||0, so:+hitting.strikeOuts||0,
    avg:hitting.avg||'', obp:hitting.obp||'', slg:hitting.slg||'', ops:hitting.ops||''
  };
}
function mlbNormPit(pitching){
  if(!pitching||!(+pitching.gamesPlayed||0))return null;
  return {
    g:+pitching.gamesPlayed||0, gs:+pitching.gamesStarted||0,
    w:+pitching.wins||0, l:+pitching.losses||0, sv:+pitching.saves||0,
    ip:pitching.inningsPitched||'', so:+pitching.strikeOuts||0, bb:+pitching.baseOnBalls||0,
    era:pitching.era||'', whip:pitching.whip||''
  };
}

window.mlbChipsHtml=function mlbChipsHtml(c){
  const s=c&&c.mlbStats; if(!s)return '';
  const yr=String(c.year||'').slice(0,4);
  const useSea=yr&&s.seasonYear===yr&&(s.seasonHitting||s.seasonPitching);

window.mlbEnrichCard=async function mlbEnrichCard(c,{force=false}={}){
  if(!c||!c.player)return null;
  const yr=String(c.year||'').replace(/\D/g,'').slice(0,4);
  const fresh=c.mlbStats&&c.mlbStats.fetched&&(Date.now()-c.mlbStats.fetched)<MLB_STATS_TTL;
  const seasonOk=!yr||(c.mlbStats&&c.mlbStats.seasonYear===yr);
  if(!force&&fresh&&seasonOk){
    mlbEnsureHeadshot(c);
    return c.mlbStats;
  }
  if(!force&&!c.mlbStats){
    const cached=mlbLookupCached(c);
    if(cached){
      c.mlbStats=summaryFromCache(cached);
      if(cached.mlbId)c.mlbId=cached.mlbId;
      if(!c.team&&cached.team)c.team=cached.team;
      mlbEnsureHeadshot(c);
      if(!yr||c.mlbStats.seasonYear===yr)return c.mlbStats;
    }
  }
  let id=c.mlbId;
  if(!id&&typeof mlbSearch==='function'){
    const hits=await mlbSearch(c.player);
    const hit=hits.find(p=>typeof bbNorm==='function'?bbNorm(p.name)===bbNorm(c.player):p.name===c.player)||hits[0];
    if(hit&&hit.mlbId){c.mlbId=hit.mlbId;id=hit.mlbId;}
  }
  if(!id)return c.mlbStats||null;
  const needCareer=force||!c.mlbStats||!fresh;
  const [person, hitting, pitching, seasonHit, seasonPit]=await Promise.all([
    needCareer?mlbFetchPerson(id):Promise.resolve(null),
    needCareer?mlbFetchCareerGroup(id,'hitting').catch(()=>null):Promise.resolve(null),
    needCareer?mlbFetchCareerGroup(id,'pitching').catch(()=>null):Promise.resolve(null),
    yr?mlbFetchSeasonGroup(id,'hitting',yr).catch(()=>null):Promise.resolve(null),
    yr?mlbFetchSeasonGroup(id,'pitching',yr).catch(()=>null):Promise.resolve(null)
  ]);
  if(person){
    c.mlbStats=mlbBuildSummary(person, hitting, pitching, seasonHit, seasonPit, yr);
  }else if(c.mlbStats){
    c.mlbStats.seasonYear=yr;
    c.mlbStats.seasonHitting=mlbNormHit(seasonHit);
    c.mlbStats.seasonPitching=mlbNormPit(seasonPit);
    c.mlbStats.fetched=Date.now();
  }else return null;
  mlbCachePut(c.mlbStats);
  if(!c.team&&c.mlbStats.team)c.team=c.mlbStats.team;
  if(c.mlbStats.pos){
    const tag='Pos: '+c.mlbStats.pos;
    if(!c.notes)c.notes=tag;
    else if(!String(c.notes).includes('Pos:'))c.notes=String(c.notes).trim()+' · '+tag;
  }
  mlbEnsureHeadshot(c);
  return c.mlbStats;
};

window.importAllMlbStats=async function importAllMlbStats({max=150,force=false}={}){
  if(!MLB_CAREER.loaded)await loadMlbCareerJson();
  const need=state.cards.filter(c=>{
    if(!c.player||String(c.player).trim().length<2)return false;
    if(force)return true;
    if(!c.mlbStats||!c.mlbStats.fetched)return true;
    return (Date.now()-c.mlbStats.fetched)>=MLB_STATS_TTL;
  }).slice(0,max);
  if(!need.length){showToast('MLB stats already loaded ✔');return 0;}
  showToast('Importing MLB career stats for '+need.length+'…');
  let done=0, fail=0, i=0;
  async function worker(){
    while(i<need.length){
      const c=need[i++];
      try{
        const s=await mlbEnrichCard(c,{force});
        if(s)done++; else fail++;
      }catch(e){fail++;}
    }
  }
  await Promise.all(Array.from({length:Math.min(4,need.length)},()=>worker()));
  save();
  if(typeof logActivity==='function')logActivity('mlb','Imported MLB stats ×'+done);
  showToast('MLB stats: '+done+' loaded'+(fail?(' · '+fail+' skipped'):'')+(need.length>=max?' — run again for more':''));
  if(sel&&typeof openSheet==='function')openSheet();
  else if(typeof render==='function')render();
  return done;
};

/* ---- init ---- */
async function init(){
  await idb.open();
  load();
  const scrub=scrubCsStoredKey();
  if(scrub==='cleared'){
    setTimeout(()=>showToast('Cleared a bad saved key — using built-in CardSight key'),0);
  }else if(scrub==='fixed'){
    setTimeout(()=>showToast('Cleaned invisible characters from your CardSight key'),0);
  }
  bbLoad();
  if(typeof loadMlbCareerJson==='function')loadMlbCareerJson();
  if(!window._proAddWrapped && typeof addFromCatalogAdvanced==='function'){
    const _add=addFromCatalogAdvanced;
    window.addFromCatalogAdvanced=async function(x,status,opts){
      const nc=await _add(x,status,opts);
      if(nc&&typeof logActivity==='function')
        logActivity(status==='want'?'want':'add',(status==='want'?'⭐ ':'✔ ')+(nc.player||'card')+(nc.num?(' #'+nc.num):''),nc.id);
      return nc;
    };
    window._proAddWrapped=true;
  }
  if(!state.meta.seenWelcome){
    state.meta.seenWelcome=1; save();
    setTimeout(()=>showToast('Type a player in search to browse cards'), 600);
  }
  setTimeout(()=>{ if(typeof autoRefreshPricesIfNeeded==='function' && tab==='dash') autoRefreshPricesIfNeeded();
    const up=(state.cards||[]).filter(c=>c.status!=='sold'&&(!c.prices||!c.prices.length)).length;
    if(up>=5 && typeof fillVaultData==='function' && Date.now()-(state.meta.lastFillData||0)>864e5)
      fillVaultData({maxLink:8,maxPriceBatches:3,silent:true}).catch(()=>{});
  }, 2500);
  $('q').oninput=e=>{
    q=e.target.value;
    clearTimeout(window.__qPropTimer);
    const v=q.trim();
    /* Have/Want/Sold/Sets: filter the vault only — never hijack to Find */
    if(tab==='have'||tab==='want'||tab==='sold'||tab==='sets'){
      render();
      return;
    }
    /* Home / Find: typing a player can open catalog search */
    if(v.length>=3 && csKey()){
      window.__qPropTimer=setTimeout(()=>{
        if(($('q').value||'').trim()!==v)return;
        if(tab==='have'||tab==='want'||tab==='sold'||tab==='sets')return;
        goExplorePlayer(v,{toast:false});
      },550);
    }else{
      if(tab==='dash')tab='have';
      render();
    }
  };
  $('q').onkeydown=e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      clearTimeout(window.__qPropTimer);
      const v=($('q').value||'').trim();
      if(tab==='have'||tab==='want'||tab==='sold'||tab==='sets'){
        q=v; render(); return;
      }
      if(v.length>=2) goExplorePlayer(v);
      else { if(tab==='dash')tab='have'; render(); }
    }
  };
  $('btnAddTop').onclick=addCard;$('fab').onclick=()=>{ if(typeof openFabMenu==='function') openFabMenu(); else addCard(); };
  $('btnXl').onclick=()=>{
    if(!state.cards.length)return alert('Add or import some cards first');
    download('card-vault-'+today()+'.xls',xlsExport(state.cards),'application/vnd.ms-excel');
    showToast('Excel workbook downloaded ✔ (5 sheets)');
  };
  $('btnIm').onclick=()=>$('fileIn').click();
  $('btnMenu').onclick=e=>{e.stopPropagation();openMenu(e.target);};
  document.addEventListener('click',e=>{const t=e.target&&e.target.closest&&e.target.closest('#btnBackupNow');if(t){e.preventDefault();doBackup(false);}const f=e.target&&e.target.closest&&e.target.closest('#btnFillDataBanner,#btnFillData');if(f){e.preventDefault();if(typeof fillVaultData==='function')fillVaultData();}});
  $('fileIn').onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)handleImportFile(f);};
  $('sheetBk').onclick=closeSheet;
  window.addEventListener('resize',()=>{if(tab==='dash')renderDash();});
  /* Load MLB map before first paint so team portraits resolve on thumbs */
  try{
    if(typeof loadMlbCareerJson==='function') await loadMlbCareerJson();
  }catch(e){}
  render();
  const warm=()=>{ if(typeof warmGiftVisuals==='function') warmGiftVisuals().catch(()=>{}); };
  if(typeof requestIdleCallback==='function') requestIdleCallback(warm,{timeout:2500});
  else setTimeout(warm, 1200);
}

/* ---- PWA ---- */
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone===true;
}
function showIosInstallHelp(){
  const el=$('iosBanner'); if(!el||isStandalone())return;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if(!isIOS)return;
  if(localStorage.getItem('cv.hideIosBanner')==='1')return;
  el.hidden=false; el.classList.add('show');
  el.innerHTML=`<div class="t"><b>Keep your collection</b>Tap Share <span style="opacity:.8">⬆︎</span> → <b>Add to Home Screen</b>. The icon auto-saves cards on this phone — Safari tabs can forget them.</div>
    <button type="button" id="iosBannerX">Got it</button>`;
  $('iosBannerX').onclick=()=>{localStorage.setItem('cv.hideIosBanner','1');el.hidden=true;el.classList.remove('show');};
}
if('serviceWorker' in navigator){
  addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
    showIosInstallHelp();
  });
}else{
  addEventListener('DOMContentLoaded',showIosInstallHelp);
}
